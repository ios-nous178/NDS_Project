name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.6.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Build Docs
        run: pnpm docs:build

      - name: Build Storybook
        run: pnpm --filter @nudge-eap/storybook build

      - name: Run Storybook tests
        run: |
          python3 -m http.server 6006 --directory apps/storybook/storybook-static >/tmp/storybook-http.log 2>&1 &
          SERVER_PID=$!
          trap "kill $SERVER_PID" EXIT
          for i in {1..30}; do
            if curl -sf http://127.0.0.1:6006/iframe.html >/dev/null; then
              break
            fi
            sleep 1
          done
          pnpm --filter @nudge-eap/storybook test-storybook --url http://127.0.0.1:6006

      - name: Check Figma link coverage
        run: node scripts/check-figma-links.mjs
