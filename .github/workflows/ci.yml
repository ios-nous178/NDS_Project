name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9.6.0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          # setup-node v5 의 packageManager 자동 감지 캐시를 끔.
          # actions/setup-node#1357 — packageManager 필드(pnpm@9.6.0) 를 보고
          # pnpm 을 호출하는데, 자동 감지가 PATH 준비 전에 돌아 죽음.
          # 명시적인 `cache: pnpm` 은 그대로 유지 (별개 경로).
          package-manager-cache: false

      - name: Install
        run: pnpm install --frozen-lockfile

      # Build 를 가장 먼저 — 컴파일 오류를 13개 테스트 스위트 다 돌리기 전에 잡고,
      # 이후 Lint/Typecheck/Test 는 turbo 의 ^build 산출물을 캐시에서 재사용한다.
      - name: Build
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Check MCP catalog freshness
        run: pnpm lint:mcp-catalog

      # react↔html 3면 미러 parity 게이트. 소프트런칭 중 — 신규 drift 를 로그로만
      # 알리고 PR 을 막지는 않는다(continue-on-error). 안정화되면 이 한 줄을 지워
      # 하드 게이트로 전환한다. (로직은 이미 baseline 대비 "신규 차단성 drift" 만 잡음.)
      - name: Check react↔html mirror parity
        run: pnpm lint:mirror-parity
        continue-on-error: true

      - name: Build Docs
        run: pnpm docs:build

      - name: Build Storybook
        run: pnpm --filter @nudge-design/storybook build

      # Storybook 테스트는 @storybook/test-runner → @storybook/addon-vitest 로 이관.
      # vitest 브라우저 모드가 스토리를 vite 로 직접 빌드/실행하므로 정적 서버가 필요 없다.
      # 현재 일부 interaction 스토리(hooks-in-render)가 SB10 vitest 브라우저에서 실패 중 —
      # test-storybook 스크립트가 `|| true` 로 pass-through 라 CI 를 막지 않는다(추후 수정 추적).
      - name: Install Playwright (chromium)
        run: pnpm --filter @nudge-design/storybook exec playwright install --with-deps chromium

      - name: Run Storybook tests
        run: pnpm --filter @nudge-design/storybook test-storybook

      - name: Check Figma link coverage
        run: node scripts/check-figma-links.mjs
