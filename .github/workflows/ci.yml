name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9.6.0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          # setup-node v5 의 packageManager 자동 감지 캐시를 끔.
          # actions/setup-node#1357 — packageManager 필드(pnpm@9.6.0) 를 보고
          # pnpm 을 호출하는데, 자동 감지가 PATH 준비 전에 돌아 죽음.
          # 명시적인 `cache: pnpm` 은 그대로 유지 (별개 경로).
          package-manager-cache: false

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Check MCP catalog freshness
        run: pnpm lint:mcp-catalog

      # react↔html 3면 미러 parity 게이트. 소프트런칭 중 — 신규 drift 를 로그로만
      # 알리고 PR 을 막지는 않는다(continue-on-error). 안정화되면 이 한 줄을 지워
      # 하드 게이트로 전환한다. (로직은 이미 baseline 대비 "신규 차단성 drift" 만 잡음.)
      - name: Check react↔html mirror parity
        run: pnpm lint:mirror-parity
        continue-on-error: true

      - name: Build Docs
        run: pnpm docs:build

      - name: Build Storybook
        run: pnpm --filter @nudge-design/storybook build

      - name: Run Storybook tests
        run: |
          python3 -m http.server 6006 --directory apps/storybook/storybook-static >/tmp/storybook-http.log 2>&1 &
          SERVER_PID=$!
          trap "kill $SERVER_PID" EXIT
          for i in {1..30}; do
            if curl -sf http://127.0.0.1:6006/iframe.html >/dev/null; then
              break
            fi
            sleep 1
          done
          pnpm --filter @nudge-design/storybook test-storybook --url http://127.0.0.1:6006

      - name: Check Figma link coverage
        run: node scripts/check-figma-links.mjs
