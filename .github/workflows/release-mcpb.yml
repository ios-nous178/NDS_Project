name: Release MCPB

# packages/mcp/manifest.json 의 version 이 바뀌었을 때만 새 릴리즈를 만든다.
# (디자인 토큰/컴포넌트만 바뀐 경우에도 catalog 가 갱신되지만, 별도 릴리즈가
#  필요하면 manifest.version 을 올려서 main 에 푸시하면 된다.)
#
# 트리거되지 않는 변경 (= .mcpb 결과물에 영향이 없는 것들):
#   - docs/**, apps/docs/**, **/*.md (README 포함) — 문서 수정
#   - mockups/**, apps/storybook/** — 스토리북/목업
#   - local-packages/**, dist/**, dist-mcpb/** — 빌드 산출물
#   - 따라서 "docs만 업데이트"한 push 는 이 워크플로우를 돌리지 않는다.
#   (여러 커밋이 한 push 에 묶여 그 중 하나라도 아래 paths 에 매치되면
#    GitHub Actions 특성상 워크플로우는 실행된다 — 그 경우 manifest.version
#    검증 단계에서 자동으로 skip 된다.)

on:
  push:
    branches: [main]
    paths:
      # mcpb 자체 (매니페스트 · MCP 서버 · 패킹 스크립트)
      - "packages/mcp/manifest.json"
      - "packages/mcp/src/**"
      - "packages/mcp/scripts/**"
      - "scripts/pack-mcpb.mjs"
      # 번들에 포함되는 DS 소스 (토큰 · 컴포넌트 · 아이콘)
      - "packages/tokens/src/**"
      - "packages/react/src/**"
      - "packages/icons/svg/**"
  workflow_dispatch: {}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      # Slack 봇 업로드용. 두 시크릿 모두 비어 있으면 알림 단계가 자동 skip 된다.
      #   - SLACK_BOT_TOKEN: xoxb- 로 시작하는 Bot User OAuth Token
      #     (chat:write · files:write 스코프 필요, 채널에 봇 invite 필수)
      #   - SLACK_CHANNEL_ID: C0123456789 형식의 채널 ID
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
      # 디자인시스템 문서 URL.
      # Repository Variables (Settings → Secrets and variables → Actions → Variables)
      # 에서 DOCS_URL 을 설정하면 그 값을 쓰고, 미설정 시 아래 기본값을 쓴다.
      DOCS_URL: ${{ vars.DOCS_URL || 'http://nudge-eap-design-system.eba-afhh232q.ap-northeast-2.elasticbeanstalk.com/' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: pnpm/action-setup@v4
        with:
          version: 9.6.0
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build DS + MCP + pack mcpb
        run: pnpm pack:mcpb

      - name: Read mcpb manifest version
        id: meta
        run: |
          VERSION=$(node -p "require('./packages/mcp/manifest.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          # 표준 SemVer 태그 형식 (vX.Y.Z) — auto-update polling 호환성을 위해
          # `mcpb-` 접두사를 빼고 단순한 v 접두사만 사용한다.
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check tag exists
        id: tag_check
        run: |
          if git rev-parse "refs/tags/${{ steps.meta.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip — same version already released
        if: steps.tag_check.outputs.exists == 'true'
        run: |
          echo "Tag ${{ steps.meta.outputs.tag }} already exists; nothing to release."
          echo "Bump packages/mcp/manifest.json version to publish a new mcpb."

      - name: Prepare versioned asset
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          cp dist-mcpb/nudge-eap-ds.mcpb \
             dist-mcpb/nudge-eap-ds-v${{ steps.meta.outputs.version }}.mcpb
          ls -lh dist-mcpb/

      - name: Create GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: NudgeEAP DS MCPB v${{ steps.meta.outputs.version }}
          # 두 파일을 같이 올린다:
          # - nudge-eap-ds.mcpb                  → "releases/latest/download/" 고정 URL 용
          # - nudge-eap-ds-v<version>.mcpb       → 받는 사람 Downloads 폴더에서 버전 식별용
          files: |
            dist-mcpb/nudge-eap-ds.mcpb
            dist-mcpb/nudge-eap-ds-v${{ steps.meta.outputs.version }}.mcpb
          body: |
            ## NudgeEAP DS MCPB v${{ steps.meta.outputs.version }}

            **설치 방법**
            - `nudge-eap-ds-v${{ steps.meta.outputs.version }}.mcpb` 를 다운받아 Claude Desktop 에서 더블클릭 (또는 Settings → Extensions → Install from file)
            - Mac/Windows 공통, Node.js 설치 불필요

            **최신 버전 직링크 (항상 최신을 가리킴)**
            ```
            https://github.com/${{ github.repository }}/releases/latest/download/nudge-eap-ds.mcpb
            ```
          generate_release_notes: true
          fail_on_unmatched_files: true

      # 1단계: 채널 헤드 = .mcpb 파일 업로드 메시지 (제일 눈에 띄게)
      #   - initial_comment 가 채널 메시지 본문, 거기에 .mcpb 파일이 첨부된다
      #   - 응답의 files[0].shares.public[CHANNEL][0].ts 로 헤드 메시지 ts 추출
      - name: Upload mcpb as channel head
        id: upload_head
        if: steps.tag_check.outputs.exists == 'false' && env.SLACK_BOT_TOKEN != '' && env.SLACK_CHANNEL_ID != ''
        uses: slackapi/slack-github-action@v2.0.0
        with:
          method: files.uploadV2
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel_id: "${{ secrets.SLACK_CHANNEL_ID }}"
            initial_comment: "📦NudgeEAP DS MCPB v${{ steps.meta.outputs.version }} 업데이트📦\n\n설치 방법 / 문서 링크 / 변경 사항은 스레드에서 확인 부탁드립니다"
            file: "./dist-mcpb/nudge-eap-ds-v${{ steps.meta.outputs.version }}.mcpb"
            filename: "nudge-eap-ds-v${{ steps.meta.outputs.version }}.mcpb"
            title: "NudgeEAP DS MCPB v${{ steps.meta.outputs.version }}"

      # 2단계: 헤드 메시지 ts 추출 + 스레드 안에 설치 안내/문서/릴리즈 페이지 댓글
      - name: Post details to Slack thread
        id: slack_details
        if: steps.tag_check.outputs.exists == 'false' && env.SLACK_BOT_TOKEN != '' && env.SLACK_CHANNEL_ID != ''
        env:
          UPLOAD_RESPONSE: ${{ steps.upload_head.outputs.response }}
          CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          VERSION: ${{ steps.meta.outputs.version }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          set -euo pipefail

          # slack-github-action v2 의 files.uploadV2 응답은 한 단계 더 감싸져
          # 실제 파일이 .files[0].files[0] 에 들어있다 (구버전 호환을 위해
          # .files[0] / .file 경로도 같이 시도).
          # 또한 V2 업로드의 채널 공유는 약간 비동기여서 즉시 응답의 .shares 가
          # 비어 있는 케이스가 있다 → 그럴 때는 file.id 로 files.info 를
          # 짧게 폴링해서 채널 공유 ts 가 채워질 때까지 기다린다.
          FILE_ID=$(printf '%s' "$UPLOAD_RESPONSE" | jq -r '
            (.files[0].files[0] // .files[0] // .file // empty).id // empty
          ')
          THREAD_TS=$(printf '%s' "$UPLOAD_RESPONSE" | jq -r --arg ch "$CHANNEL_ID" '
            (.files[0].files[0] // .files[0] // .file // empty) as $f |
            $f.shares.public[$ch][0].ts //
            $f.shares.private[$ch][0].ts //
            empty
          ')

          INFO=""
          if [ -z "$THREAD_TS" ] && [ -n "$FILE_ID" ]; then
            for attempt in 1 2 3 4 5; do
              sleep 2
              INFO=$(curl -sS "https://slack.com/api/files.info?file=$FILE_ID" \
                -H "Authorization: Bearer $BOT_TOKEN")
              THREAD_TS=$(printf '%s' "$INFO" | jq -r --arg ch "$CHANNEL_ID" '
                .file.shares.public[$ch][0].ts //
                .file.shares.private[$ch][0].ts //
                empty
              ')
              [ -n "$THREAD_TS" ] && break
            done
          fi

          if [ -z "$THREAD_TS" ]; then
            echo "::error::헤드 메시지 ts 추출 실패. 업로드 응답:"
            echo "$UPLOAD_RESPONSE"
            if [ -n "$INFO" ]; then
              echo "마지막 files.info 응답:"
              echo "$INFO"
            fi
            exit 1
          fi
          echo "thread_ts=$THREAD_TS" >> "$GITHUB_OUTPUT"

          # printf 로 멀티라인 문자열 빌드 (YAML block scalar 들여쓰기 회피용)
          DETAILS=$(printf '%s\n' \
            '*설치 방법*' \
            'Claude Desktop 에서 헤드 메시지에 첨부된 .mcpb 파일을 더블클릭하거나 Settings → Extensions → Install from file 로 설치하세요.' \
            "또는 <${{ env.DOCS_URL }}|디자인시스템 문서> 내부 상세 가이드를 확인하세요." \
            '' \
            '*디자인시스템 문서*' \
            "${{ env.DOCS_URL }}" \
            '' \
            '*릴리즈 페이지*' \
            "https://github.com/${{ github.repository }}/releases/tag/$TAG")

          PAYLOAD=$(jq -n \
            --arg channel "$CHANNEL_ID" \
            --arg thread "$THREAD_TS" \
            --arg text "$DETAILS" \
            '{channel: $channel, thread_ts: $thread, text: $text, unfurl_links: false, unfurl_media: false}')

          RESP=$(curl -sS -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer $BOT_TOKEN" \
            -H "Content-Type: application/json; charset=utf-8" \
            --data "$PAYLOAD")
          echo "Slack response: $RESP"
          echo "$RESP" | jq -e '.ok' >/dev/null

      # 3단계: 같은 스레드에 변경 사항(git log 기반) 댓글
      #   PR 워크플로우가 아니라 직접 push 하는 팀이라 GitHub generate-notes API
      #   대신 git log 로 직접 커밋 메시지를 뽑는다. 빌드 산출물 자동 커밋
      #   (chore: rebuild local-packages…) 은 노이즈라 제외한다.
      - name: Post changelog to Slack thread
        if: steps.tag_check.outputs.exists == 'false' && env.SLACK_BOT_TOKEN != '' && env.SLACK_CHANNEL_ID != '' && steps.slack_details.outputs.thread_ts != ''
        env:
          CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          THREAD_TS: ${{ steps.slack_details.outputs.thread_ts }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          set -euo pipefail

          # 새로 만든 태그(TAG) 직전의 가장 최근 태그를 찾는다.
          # (없으면 = 최초 릴리즈, 전체 히스토리에서 뽑는다.)
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${TAG}$" | head -n 1 || true)
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..${TAG}"
            HEADER="*변경 사항* (\`${PREV_TAG}\` → \`${TAG}\`)"
          else
            RANGE="${TAG}"
            HEADER="*변경 사항* (최초 릴리즈)"
          fi

          # 노이즈 커밋 필터: rebuild local-packages / Merge branch
          COMMITS=$(git log --no-merges --pretty='format:- %s' "$RANGE" \
            | grep -Ev '^- chore: rebuild local-packages' \
            | grep -Ev '^- Merge branch ' \
            || true)

          if [ -z "$(echo "$COMMITS" | tr -d '[:space:]')" ]; then
            BODY=$(printf '%s\n\n%s' "$HEADER" '_변경 사항 없음 (노이즈 커밋만 존재)_')
          else
            BODY=$(printf '%s\n\n%s' "$HEADER" "$COMMITS")
          fi

          # Slack text 한도 4000자, 여유 두고 3500자에서 자른다
          if [ ${#BODY} -gt 3500 ]; then
            BODY=$(printf '%s\n\n%s' "${BODY:0:3500}" '_(이하 생략 — 릴리즈 페이지에서 전체 확인)_')
          fi

          PAYLOAD=$(jq -n \
            --arg channel "$CHANNEL_ID" \
            --arg thread "$THREAD_TS" \
            --arg text "$BODY" \
            '{channel: $channel, thread_ts: $thread, text: $text, unfurl_links: false, unfurl_media: false}')

          RESP=$(curl -sS -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer $BOT_TOKEN" \
            -H "Content-Type: application/json; charset=utf-8" \
            --data "$PAYLOAD")
          echo "Slack response: $RESP"
          echo "$RESP" | jq -e '.ok' >/dev/null
