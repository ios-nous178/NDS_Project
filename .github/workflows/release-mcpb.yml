name: Release MCPB

# packages/mcp/manifest.json 의 version 이 바뀌었을 때만 새 릴리즈를 만든다.
# (디자인 토큰/컴포넌트만 바뀐 경우에도 catalog 가 갱신되지만, 별도 릴리즈가
#  필요하면 manifest.version 을 올려서 main 에 푸시하면 된다.)

on:
  push:
    branches: [main]
    paths:
      - "packages/mcp/manifest.json"
      - "packages/mcp/src/**"
      - "packages/mcp/scripts/**"
      - "packages/tokens/src/**"
      - "packages/react/src/**"
      - "packages/icons/svg/**"
      - "scripts/pack-mcpb.mjs"
  workflow_dispatch: {}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: pnpm/action-setup@v4
        with:
          version: 9.6.0
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build DS + MCP + pack mcpb
        run: pnpm pack:mcpb

      - name: Read mcpb manifest version
        id: meta
        run: |
          VERSION=$(node -p "require('./packages/mcp/manifest.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          # 표준 SemVer 태그 형식 (vX.Y.Z) — auto-update polling 호환성을 위해
          # `mcpb-` 접두사를 빼고 단순한 v 접두사만 사용한다.
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check tag exists
        id: tag_check
        run: |
          if git rev-parse "refs/tags/${{ steps.meta.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip — same version already released
        if: steps.tag_check.outputs.exists == 'true'
        run: |
          echo "Tag ${{ steps.meta.outputs.tag }} already exists; nothing to release."
          echo "Bump packages/mcp/manifest.json version to publish a new mcpb."

      - name: Prepare versioned asset
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          cp dist-mcpb/nudge-eap-ds.mcpb \
             dist-mcpb/nudge-eap-ds-v${{ steps.meta.outputs.version }}.mcpb
          ls -lh dist-mcpb/

      - name: Create GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: NudgeEAP DS MCPB v${{ steps.meta.outputs.version }}
          # 두 파일을 같이 올린다:
          # - nudge-eap-ds.mcpb                  → "releases/latest/download/" 고정 URL 용
          # - nudge-eap-ds-v<version>.mcpb       → 받는 사람 Downloads 폴더에서 버전 식별용
          files: |
            dist-mcpb/nudge-eap-ds.mcpb
            dist-mcpb/nudge-eap-ds-v${{ steps.meta.outputs.version }}.mcpb
          body: |
            ## NudgeEAP DS MCPB v${{ steps.meta.outputs.version }}

            **설치 방법**
            - `nudge-eap-ds-v${{ steps.meta.outputs.version }}.mcpb` 를 다운받아 Claude Desktop 에서 더블클릭 (또는 Settings → Extensions → Install from file)
            - Mac/Windows 공통, Node.js 설치 불필요

            **최신 버전 직링크 (항상 최신을 가리킴)**
            ```
            https://github.com/${{ github.repository }}/releases/latest/download/nudge-eap-ds.mcpb
            ```
          generate_release_notes: true
          fail_on_unmatched_files: true
