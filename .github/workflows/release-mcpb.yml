name: Release MCPB

# packages/mcp/manifest.json 의 version 이 바뀌었을 때만 새 릴리즈를 만든다.
# (디자인 토큰/컴포넌트만 바뀐 경우에도 catalog 가 갱신되지만, 별도 릴리즈가
#  필요하면 manifest.version 을 올려서 main 에 푸시하면 된다.)
#
# 트리거되지 않는 변경 (= .mcpb 결과물에 영향이 없는 것들):
#   - docs/**, apps/docs/**, **/*.md (README 포함) — 문서 수정
#   - mockups/**, apps/storybook/** — 스토리북/목업
#   - local-packages/**, dist/**, dist-mcpb/** — 빌드 산출물
#   - 따라서 "docs만 업데이트"한 push 는 이 워크플로우를 돌리지 않는다.
#   (여러 커밋이 한 push 에 묶여 그 중 하나라도 아래 paths 에 매치되면
#    GitHub Actions 특성상 워크플로우는 실행된다 — 그 경우 manifest.version
#    검증 단계에서 자동으로 skip 된다.)

on:
  push:
    branches: [main]
    paths:
      # mcpb 자체 (매니페스트 · MCP 서버 · 패킹 스크립트)
      - "packages/mcp/manifest.json"
      - "packages/mcp/src/**"
      - "packages/mcp/scripts/**"
      - "scripts/pack-mcpb.mjs"
      # 번들에 포함되는 DS 소스 (토큰 · 컴포넌트 · 아이콘)
      - "packages/tokens/src/**"
      - "packages/react/src/**"
      - "packages/icons/svg/**"
  workflow_dispatch: {}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      # Slack 봇 업로드용. 두 시크릿 모두 비어 있으면 알림 단계가 자동 skip 된다.
      #   - SLACK_BOT_TOKEN: xoxb- 로 시작하는 Bot User OAuth Token
      #     (chat:write · files:write 스코프 필요, 채널에 봇 invite 필수)
      #   - SLACK_CHANNEL_ID: C0123456789 형식의 채널 ID
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
      # 디자인시스템 문서 URL.
      # Repository Variables (Settings → Secrets and variables → Actions → Variables)
      # 에서 DOCS_URL 을 설정하면 그 값을 쓰고, 미설정 시 아래 기본값을 쓴다.
      DOCS_URL: ${{ vars.DOCS_URL || 'http://nudge-eap-design-system.eba-afhh232q.ap-northeast-2.elasticbeanstalk.com/' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - uses: pnpm/action-setup@v4
        with:
          version: 9.6.0
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build DS + MCP + pack mcpb
        run: pnpm pack:mcpb

      - name: Smoke test MCPB bundle
        run: pnpm smoke:mcpb

      - name: Read mcpb manifest version
        id: meta
        run: |
          VERSION=$(node -p "require('./packages/mcp/manifest.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          # 표준 SemVer 태그 형식 (vX.Y.Z) — auto-update polling 호환성을 위해
          # `mcpb-` 접두사를 빼고 단순한 v 접두사만 사용한다.
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check tag exists
        id: tag_check
        run: |
          if git rev-parse "refs/tags/${{ steps.meta.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip — same version already released
        if: steps.tag_check.outputs.exists == 'true'
        run: |
          echo "Tag ${{ steps.meta.outputs.tag }} already exists; nothing to release."
          echo "Bump packages/mcp/manifest.json version to publish a new mcpb."

      - name: Prepare versioned asset
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          cp dist-mcpb/nudge-eap-ds.mcpb \
             dist-mcpb/nudge-eap-ds-v${{ steps.meta.outputs.version }}.mcpb
          ls -lh dist-mcpb/

      # git log 기반 변경사항을 한 번 추출해 두고 GitHub Release body 와 Slack
      # changelog 댓글이 같은 결과를 재사용한다. GitHub 의 generate-release-notes
      # API 는 PR 머지 워크플로우 가정이라 direct-push 인 이 레포에서는 거의 비어
      # 나와 의미있는 변경사항을 못 채운다 — 그래서 본문에 직접 박는다.
      - name: Build changelog
        id: changelog
        if: steps.tag_check.outputs.exists == 'false'
        env:
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          set -euo pipefail

          # action-gh-release 가 새 tag 를 remote 에만 만들기 때문에 local 에는
          # 아직 그 tag 가 없을 수 있다. 새 tag commit == 현재 HEAD 이므로
          # RANGE 의 종점은 HEAD 로 잡는다.
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${TAG}$" | head -n 1 || true)
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..HEAD"
            RANGE_LABEL="\`${PREV_TAG}\` → \`${TAG}\`"
          else
            RANGE="HEAD"
            RANGE_LABEL="최초 릴리즈"
          fi
          echo "::notice::changelog range = ${RANGE} (prev=${PREV_TAG:-<none>}, head=$(git rev-parse --short HEAD))"

          # ── changelog 정제 ─────────────────────────────────────
          # 1) 노이즈 커밋 제거 (외부 사용자에게 의미 없는 내부 변경)
          #    - chore: rebuild local-packages         → release 마다 자동 커밋되는 산출물
          #    - Merge branch                          → 머지 자체
          #    - any-type(release-mcpb)                → 릴리즈 워크플로우 내부 (prefix 무관)
          #    - any-type(docs-page)                   → docs 페이지 자체 수정 (prefix 무관)
          #    - chore(mcp): bump …                    → 버전 bump (릴리즈 자체가 이미 그 정보)
          # 2) Conventional Commits prefix 제거 — feat(scope)/fix/docs/chore… 의
          #    "feat(scope): " 부분을 떼고 본문만 남겨 가독성을 높인다.
          # 3) 앞에 "- " 붙여 markdown bullet 형태로 통일
          COMMITS=$(git log --no-merges --pretty='format:%s' "$RANGE" \
            | grep -Ev '^chore: rebuild local-packages' \
            | grep -Ev '^Merge branch ' \
            | grep -Ev '^[a-z]+(\([^)]*\))?!?:\s*bump\s+mcpb' \
            | grep -Ev '^[a-z]+\(release-mcpb\)' \
            | grep -Ev '^[a-z]+\(docs-page\)' \
            | sed -E 's/^(feat|fix|docs|chore|refactor|perf|test|style|build|ci)(\([^)]*\))?!?: ?//' \
            | sed 's/^/- /' \
            || true)

          if [ -z "$(printf '%s' "$COMMITS" | tr -d '[:space:]')" ]; then
            COMMITS="_사용자에게 영향있는 변경 사항 없음 (내부 작업만 있음)_"
          fi

          {
            echo "range_label=${RANGE_LABEL}"
            echo "commits<<COMMITS_EOF"
            printf '%s\n' "$COMMITS"
            echo "COMMITS_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: NudgeEAP DS MCPB v${{ steps.meta.outputs.version }}
          # 두 파일을 같이 올린다:
          # - nudge-eap-ds.mcpb                  → "releases/latest/download/" 고정 URL 용
          # - nudge-eap-ds-v<version>.mcpb       → 받는 사람 Downloads 폴더에서 버전 식별용
          files: |
            dist-mcpb/nudge-eap-ds.mcpb
            dist-mcpb/nudge-eap-ds-v${{ steps.meta.outputs.version }}.mcpb
          body: |
            ## NudgeEAP DS MCPB v${{ steps.meta.outputs.version }}

            ### 처음 설치하시는 분
            1. 아래 `nudge-eap-ds-v${{ steps.meta.outputs.version }}.mcpb` 를 다운로드
            2. Claude Desktop → Settings → Extensions → **Install from file** 선택 (또는 .mcpb 더블클릭)
            3. `⌘Q` 로 Claude Desktop 완전 종료 후 다시 실행

            ### 업데이트하시는 분
            1. Claude Desktop → Settings → Extensions → `nudge-eap-ds` 옆 **Update** 버튼
            2. Update 버튼이 안 보이면 위의 "처음 설치" 와 동일하게 .mcpb 재설치
            3. `⌘Q` 로 Claude Desktop 완전 종료 후 다시 실행

            ### 외부 mockup 프로젝트 사용자
            DS 패키지 (`@nudge-eap/*`) 가 갱신되었으면 mockup 프로젝트 루트에서 클린 재설치하세요. MCP 의 `get_install_command` 도구가 정확한 .tgz 경로를 알려줍니다.
            ```bash
            rm -rf node_modules/@nudge-eap* && npm install <.tgz 경로들>
            ```

            ### 변경 사항 (${{ steps.changelog.outputs.range_label }})
            ${{ steps.changelog.outputs.commits }}

            ---
            **디자인시스템 문서**: ${{ env.DOCS_URL }}

            **최신 버전 직링크 (항상 최신을 가리킴)**
            ```
            https://github.com/${{ github.repository }}/releases/latest/download/nudge-eap-ds.mcpb
            ```
          generate_release_notes: false
          fail_on_unmatched_files: true

      # ─── Slack 알림 ───────────────────────────────────────────
      # 구조:
      #   1) 채널 헤드(텍스트) → chat.postMessage 로 박아 ts 를 즉시 확정
      #   2) .mcpb 파일 → 스레드 안에 업로드 (files.uploadV2 thread_ts)
      #   3) 설치 안내/문서/릴리즈 페이지 → 스레드 댓글
      #   4) git log 기반 변경사항 → 스레드 댓글
      #
      # 이전에는 "파일을 채널 헤드로 직접 업로드"하는 구조였는데,
      # slack-github-action v2 의 files.uploadV2 응답이 채널 공유 ts 를
      # 즉시 채워주지 않는 케이스가 있어 스레드 댓글 단계가 깨졌다.
      # chat.postMessage 응답의 ts 는 결정론적이므로 헤드를 먼저 박는다.
      # (files.info 폴링도 불필요 → files:read 스코프 없이 chat:write +
      #  files:write 만으로 동작)
      - name: Post Slack channel head
        id: head
        if: steps.tag_check.outputs.exists == 'false' && env.SLACK_BOT_TOKEN != '' && env.SLACK_CHANNEL_ID != ''
        env:
          CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail

          TEXT=$(printf '%s\n\n%s' \
            "📦 *NudgeEAP DS MCPB v${VERSION} Update* 📦" \
            "_설치 방법 · 문서 링크 · 변경 사항은 스레드에서 확인 부탁드립니다_")

          PAYLOAD=$(jq -n \
            --arg channel "$CHANNEL_ID" \
            --arg text "$TEXT" \
            '{channel: $channel, text: $text, unfurl_links: false, unfurl_media: false}')

          RESP=$(curl -sS -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer $BOT_TOKEN" \
            -H "Content-Type: application/json; charset=utf-8" \
            --data "$PAYLOAD")
          echo "Slack response: $RESP"
          echo "$RESP" | jq -e '.ok' >/dev/null

          TS=$(printf '%s' "$RESP" | jq -r '.ts // empty')
          if [ -z "$TS" ]; then
            echo "::error::chat.postMessage 응답에서 ts 추출 실패: $RESP"
            exit 1
          fi
          echo "thread_ts=$TS" >> "$GITHUB_OUTPUT"

      - name: Upload mcpb to Slack thread
        if: steps.tag_check.outputs.exists == 'false' && steps.head.outputs.thread_ts != ''
        uses: slackapi/slack-github-action@v2.0.0
        with:
          method: files.uploadV2
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel_id: "${{ secrets.SLACK_CHANNEL_ID }}"
            thread_ts: "${{ steps.head.outputs.thread_ts }}"
            file: "./dist-mcpb/nudge-eap-ds-v${{ steps.meta.outputs.version }}.mcpb"
            filename: "nudge-eap-ds-v${{ steps.meta.outputs.version }}.mcpb"
            title: "NudgeEAP DS MCPB v${{ steps.meta.outputs.version }}"

      - name: Post install details to Slack thread
        if: steps.tag_check.outputs.exists == 'false' && steps.head.outputs.thread_ts != ''
        env:
          CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          THREAD_TS: ${{ steps.head.outputs.thread_ts }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          set -euo pipefail

          DETAILS=$(printf '%s\n' \
            '────────────────────────────' \
            '*설치 방법*' \
            '첨부된 .mcpb 파일을 다운받아 Claude Desktop 에서 설치하세요.' \
            "자세한 가이드는 <${{ env.DOCS_URL }}|디자인시스템 문서>에서 확인할 수 있어요." \
            '' \
            '*업데이트 방법*' \
            '이미 설치된 분이라면, 새로 받은 .mcpb 파일을 더블클릭만 해주세요. Claude Desktop 에 *Update* 버튼이 뜨면 눌러서 업데이트하고, `⌘Q` 로 Claude Desktop 을 완전히 종료한 뒤 다시 실행해 주세요.' \
            '' \
            '*디자인시스템 문서*' \
            "${{ env.DOCS_URL }}" \
            '' \
            '*릴리즈 페이지*' \
            "https://github.com/${{ github.repository }}/releases/tag/$TAG" \
            '────────────────────────────')

          PAYLOAD=$(jq -n \
            --arg channel "$CHANNEL_ID" \
            --arg thread "$THREAD_TS" \
            --arg text "$DETAILS" \
            '{channel: $channel, thread_ts: $thread, text: $text, unfurl_links: false, unfurl_media: false}')

          RESP=$(curl -sS -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer $BOT_TOKEN" \
            -H "Content-Type: application/json; charset=utf-8" \
            --data "$PAYLOAD")
          echo "Slack response: $RESP"
          echo "$RESP" | jq -e '.ok' >/dev/null

      # Slack 변경사항 본문 선택:
      # 1순위) .release-notes/pending.md  — 사람(보통 Claude CLI 통해)이 commit 한
      #         "비개발자용" 톤의 변경사항. 릴리즈 commit 에 포함되어 들어온다.
      # 2순위) Build changelog step 의 git log 결과 (개발자용 raw, 안전한 fallback).
      #
      # ★ CI 불변 규칙: 이 워크플로우는 .release-notes/pending.md 를
      #   READ-ONLY 로만 사용한다. 절대 수정 / 재생성 / 삭제하지 않는다.
      #   외부 LLM 호출 일체 없음 — 사람이 commit 한 본문이 그대로 슬랙으로 나간다.
      #   (자동 재작성이 필요하면 로컬에서 `pnpm release-notes` 를 돌리고 검토 후 commit)
      # GitHub Release body 는 손대지 않는다 — 개발자는 거기서 raw 커밋을 본다.
      - name: Post changelog to Slack thread
        if: steps.tag_check.outputs.exists == 'false' && steps.head.outputs.thread_ts != ''
        env:
          CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          THREAD_TS: ${{ steps.head.outputs.thread_ts }}
          RANGE_LABEL: ${{ steps.changelog.outputs.range_label }}
          COMMITS: ${{ steps.changelog.outputs.commits }}
        run: |
          set -euo pipefail

          FRIENDLY_FILE=".release-notes/pending.md"
          # immutability assert: checkout 이후 어떤 step 도 이 파일을 건드리지
          # 않았는지 확인. 누군가 워크플로우에 가공 step 을 끼워넣으면 즉시 실패해서
          # "사람이 commit 한 본문 그대로 나간다" 약속을 깨지 않게 한다.
          if [ -e "$FRIENDLY_FILE" ]; then
            if ! git diff --quiet -- "$FRIENDLY_FILE" 2>/dev/null; then
              echo "::error::$FRIENDLY_FILE was modified during the CI run — refuse to send to Slack."
              git --no-pager diff -- "$FRIENDLY_FILE" || true
              exit 1
            fi
          fi

          if [ -s "$FRIENDLY_FILE" ]; then
            echo "::notice::Using friendly changelog from $FRIENDLY_FILE"
            CONTENT=$(cat "$FRIENDLY_FILE")
            HEADER="*이번 업데이트에서 달라진 점* (${RANGE_LABEL})"
          else
            echo "::notice::No $FRIENDLY_FILE found — falling back to git log"
            CONTENT="$COMMITS"
            HEADER="*변경 사항* (${RANGE_LABEL})"
          fi

          BODY=$(printf '%s\n\n%s' "$HEADER" "$CONTENT")

          # Slack text 한도 4000자, 여유 두고 3500자에서 자른다
          if [ ${#BODY} -gt 3500 ]; then
            BODY=$(printf '%s\n\n%s' "${BODY:0:3500}" '_(이하 생략 — 릴리즈 페이지에서 전체 확인)_')
          fi

          PAYLOAD=$(jq -n \
            --arg channel "$CHANNEL_ID" \
            --arg thread "$THREAD_TS" \
            --arg text "$BODY" \
            '{channel: $channel, thread_ts: $thread, text: $text, unfurl_links: false, unfurl_media: false}')

          RESP=$(curl -sS -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer $BOT_TOKEN" \
            -H "Content-Type: application/json; charset=utf-8" \
            --data "$PAYLOAD")
          echo "Slack response: $RESP"
          echo "$RESP" | jq -e '.ok' >/dev/null
