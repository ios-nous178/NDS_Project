name: Version Packages PR

# main 에 changeset 이 쌓이면 "Version Packages" PR 을 자동 생성/갱신한다.
# (changesets/action 이 changeset-release/main 브랜치에 `pnpm version-packages` 결과를
#  커밋 — sync-mcpb-version.mjs 체인으로 루트 package.json·manifest 미러까지 같이 맞춘다.)
#
# DS 패키지는 CalVer(연.월.배포, patch-only) — 이 bump 가 main 에 들어가면
# release-mcpb.yml 이 DS 버전으로 태그를 발화한다. manifest.json(MCP 트랙)은
# DS 와 디커플돼 별도 버전(예 0.0.1)을 가진다. 즉 사람의 역할이 "릴리즈 절차를
# 기억해서 수행"에서 "열려 있는 PR 을 검토하고 머지"로 바뀐다 — 릴리즈 누락(번들 stale)의 침묵을 없앤다.
#
# ★ CI 불변 규칙 유지: .release-notes/pending.md (비개발자 톤 변경사항)는
#   이 워크플로우가 절대 생성/수정하지 않는다. PR 브랜치를 로컬로 받아
#   `pnpm release-notes` 를 돌리고 검토 후 커밋한다 (release-mcpb.yml 의
#   read-only 원칙과 동일 — 사람이 commit 한 본문만 슬랙으로 나간다).

on:
  push:
    branches: [main]
    paths:
      - ".changeset/*.md"
  workflow_dispatch:

concurrency: version-pr-main

jobs:
  version-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          # release-mcpb.yml 과 동일 — setup-node v5 의 packageManager 자동 감지가
          # pnpm/action-setup 보다 먼저 돌아 실패하는 문제 회피.
          package-manager-cache: false

      - uses: pnpm/action-setup@v5
        with:
          version: 9.6.0
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create or update Version Packages PR
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # PR 머지 전 사람이 해야 할 일을 PR 코멘트로 고정 — pending.md 작성 검토 게이트.
      - name: Post release checklist comment
        if: steps.changesets.outputs.pullRequestNumber != ''
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ steps.changesets.outputs.pullRequestNumber }}
        run: |
          BODY=$(printf '%s\n' \
            '## 머지 전 체크리스트' \
            '' \
            '- [ ] 이 브랜치를 로컬로 받아 `pnpm release-notes` 실행 → `.release-notes/pending.md` 톤 검토 후 커밋' \
            '  (안 하면 슬랙 변경사항이 git log raw 로 나간다 — CI 는 pending.md 를 절대 생성하지 않음)' \
            '- [ ] 버전 bump 결과 확인 — DS 패키지 = CalVer(연.월.배포, patch-only). `manifest.json` 은 디커플된 MCP 트랙(별도)' \
            '' \
            '머지하면 release-mcpb.yml 이 자동으로 태그/릴리즈/슬랙 알림까지 처리한다.')
          gh pr comment "$PR" --edit-last --body "$BODY" 2>/dev/null \
            || gh pr comment "$PR" --body "$BODY"
