# electron-builder — Nudge Studio 패키징 (Phase 4)
#
# electron-vite 가 out/{main,preload,renderer} 로 번들한 뒤 이 설정으로 installer 를 만든다.
# main/preload 는 deps 외부화(externalizeDepsPlugin) 라 런타임에 node_modules 를 resolve 한다
# → 그 production 의존성(@nudge-design/*, chokidar, cheerio→undici, @babel/parser …)이
#   asar 안에 들어가야 packaged 앱이 동작한다(electron-builder 가 자동 포함).
#
# catalog.json 은 번들 외부 리소스로 동봉 → main/catalog.ts 의
#   process.resourcesPath/catalog.json 분기가 packaged 환경에서 이걸 읽는다.
appId: io.cashwalk.nudge-studio
productName: Nudge Studio
directories:
  output: release
files:
  - out/**
  - package.json
  # pnpm 워크스페이스 의존성은 패키지 루트가 심볼릭 링크라 turbo 캐시(.turbo/*.log)까지
  # asar 수집 대상에 끌려온다. realpath 가 apps/desktop 밖이라 패킹 시 상대경로 계산이
  # 터지므로(getRelativePath) 명시적으로 제외한다.
  - "!**/.turbo"
  - "!**/.turbo/**"
extraResources:
  - from: ../../packages/mcp/catalog.json
    to: catalog.json
  # nudge-ds MCP 서버 자체완결 번들(esbuild 단일 파일 + catalog + references) → resources/mcp/.
  # scripts/bundle-mcp-desktop.mjs 산출물(apps/desktop/.mcp-bundle/). node_modules·네이티브
  # 모듈 없음 → Win/Mac 그대로 복사. agent-runner 가 claude 실행 시
  # resources/mcp/dist/tools/server.mjs 를 Electron-as-node 로 띄워 --mcp-config 로 주입
  # → 받는 사람이 node/MCP 설치 없이도 nudge-ds 도구가 붙는다.
  - from: .mcp-bundle
    to: mcp
asar: true
# node-pty 의 네이티브 `.node` 는 asar 안에서 dlopen 불가 → asar 밖으로 추출해야 로드된다.
asarUnpack:
  - "**/node_modules/node-pty/**"
# node-pty 1.1.0 ships prebuilds for darwin-arm64/darwin-x64/win32-x64. Rebuilding it
# during packaging can hang inside @electron/rebuild on Apple Silicon, while the
# packaged app can load the bundled prebuilds as long as node-pty is unpacked.
npmRebuild: false
# prebuild 의 spawn-helper 가 0644(실행불가)로 풀려 패키징되면 PTY spawn 시
# "posix_spawnp failed" 로 죽는다 → afterPack 에서 0755 강제. (scripts/after-pack.cjs)
afterPack: scripts/after-pack.cjs
# 앱 아이콘 — build/icon-master.svg(docs 로고 마크, 흰색) → icns/ico/png 로 생성.
# build/ 는 electron-builder 의 기본 buildResources 라 자동 감지되지만 명시해 둔다.
mac:
  icon: build/icon.icns
  # universal = arm64 + x64 단일 .app/.dmg (Apple Silicon · Intel 맥 모두 한 산출물로 커버).
  target:
    - target: dmg
      arch: universal
    - target: zip
      arch: universal
  category: public.app-category.developer-tools
win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch: x64
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
