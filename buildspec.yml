version: 0.2

# CodeBuild buildspec for Nudge Design System
# - Builds Storybook (static) and Docusaurus (docs)
# - Bundles them with apps/web-server (Express) into an EB-deployable artifact
# - The output artifact is consumed by the CodePipeline Elastic Beanstalk Deploy action

env:
  variables:
    PNPM_VERSION: "9.6.0"

phases:
  install:
    runtime-versions:
      nodejs: 24
    commands:
      - corepack enable
      - corepack prepare pnpm@${PNPM_VERSION} --activate
      - pnpm config set store-dir .pnpm-store
      - node -v
      - pnpm -v

  pre_build:
    commands:
      # 툴체인 가시화 — 로그가 꺼져 있어도 실행 세부정보의 명령 단위로 어디서 깨지는지 보이게 한다.
      - echo "=== toolchain ===" && which node && node -v && which pnpm && pnpm -v
      # Node 24 가드 — base AMI(amazonlinux-x86_64-base)는 runtime-versions:nodejs:24 를 보장하지 않는다.
      # 구버전 Node 로 떨어지면 install 은 통과해도 generate:ssot/tsc 가 깨지므로 여기서 명확히 실패시킨다.
      - |
        NODE_MAJOR=$(node -p "process.versions.node.split('.')[0]")
        if [ "$NODE_MAJOR" != "24" ]; then
          echo "FATAL: Node 24 expected but found $(node -v). 이미지 'amazonlinux-x86_64-base' 가 runtime-versions 를 무시했을 수 있음 — 관리형 이미지(aws/codebuild/amazonlinux-x86_64-standard:5.0)로 바꾸거나 Node 24 를 명시 설치하세요." >&2
          exit 1
        fi
      - pnpm install --frozen-lockfile
      # generate:ssot 를 구성 하위명령으로 펼친다 — 실패 시 CodeBuild 가 '깨진 하위명령'을 단독으로 보고(로그 미설정에도 단계 특정 가능).
      - pnpm exec turbo build --filter=@nudge-design/mcp^... --output-logs=errors-only
      - pnpm --filter @nudge-design/mcp build
      - pnpm generate:component-guides
      - pnpm generate:brand-coverage
      - pnpm generate:icon-catalog
      - pnpm generate:guide-docs

  build:
    commands:
      - pnpm build
      # docs 가 / 에서 서빙되므로 navbar 의 Storybook 링크는 동일 오리진의 /storybook/ 으로 둔다.
      - STORYBOOK_BASE_URL=/storybook/ pnpm docs:build
      - pnpm --filter @nudge-design/storybook build

  post_build:
    commands:
      - rm -rf eb-bundle
      - mkdir -p eb-bundle/public/storybook eb-bundle/public/docs
      - cp -R apps/storybook/storybook-static/. eb-bundle/public/storybook/
      - cp -R apps/docs/build/. eb-bundle/public/docs/
      - cp apps/web-server/server.js apps/web-server/package.json apps/web-server/Procfile eb-bundle/
      - cd eb-bundle && npm install --omit=dev --no-audit --no-fund && cd ..
      - echo "=== eb-bundle contents ==="
      - ls -la eb-bundle
      - du -sh eb-bundle

artifacts:
  base-directory: eb-bundle
  files:
    - "**/*"
  name: nudge-ds-$(date +%Y-%m-%d-%H%M%S)

cache:
  paths:
    - ".pnpm-store/**/*"
    - "node_modules/.cache/**/*"
    - ".turbo/**/*"
