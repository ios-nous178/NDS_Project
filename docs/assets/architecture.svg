<svg width="680" viewBox="0 0 680 612" role="img" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans KR',sans-serif">
<title>Nudge Design System 패키지 아키텍처 개요</title>
<desc>위에서 아래로 빌드·의존 순서: 브랜드 토큰 override가 기반 패키지(tokens·icons·assets)에 주입되고, 공용 스타일·프리셋(styles·tailwind-preset·catalog)을 거쳐 컴포넌트(react·html)가 만들어진다. 컴포넌트는 내부 앱(storybook·docs·web-server·desktop)과 mockup-core→mcp→외부 소비자 경로 두 갈래로 소비된다.</desc>
