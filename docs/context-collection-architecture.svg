<svg width="1280" height="820" viewBox="0 0 1280 820" xmlns="http://www.w3.org/2000/svg" font-family="'Pretendard','Apple SD Gothic Neo','Malgun Gothic',system-ui,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5B6473"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2F6BD6"/>
    </marker>
    <marker id="arrowFly" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#9333EA"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1280" height="820" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="56" y="46" font-size="23" font-weight="700" fill="#1A1F2B">Nudge DS — 사내 컨텍스트 수집 구조 (MCP-only)</text>
  <text x="56" y="72" font-size="14" fill="#6B7280">afterCall 중앙 훅 1곳에 캡처 · 로컬=항상 · egress=ship moment + opt-in · 학습 flywheel로 순환</text>

  <!-- ===== LEFT / CENTER FLOW ===== -->

  <!-- Consumer -->
  <rect x="56" y="96" width="772" height="60" rx="12" fill="#EEF1F5" stroke="#C7CEDA"/>
  <text x="442" y="122" font-size="15" font-weight="700" fill="#1A1F2B" text-anchor="middle">아무 MCP 소비자</text>
  <text x="442" y="142" font-size="13" fill="#5B6473" text-anchor="middle">Nudge Studio (데스크톱)  ·  외부 Claude Code — 둘 다 같은 MCP를 거침</text>

  <!-- arrow to MCP -->
  <line x1="442" y1="156" x2="442" y2="194" stroke="#5B6473" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="452" y="180" font-size="12" fill="#6B7280">툴 호출 (find / get_guide / recommend / save / build / validate)</text>

  <!-- MCP container -->
  <rect x="56" y="198" width="772" height="372" rx="14" fill="#F7F8FA" stroke="#B9C2D0" stroke-width="1.4"/>
  <text x="74" y="224" font-size="14" font-weight="700" fill="#1A1F2B">MCP 서버 — 유일·보편 길목</text>

  <!-- afterCall bar -->
  <rect x="80" y="236" width="724" height="50" rx="10" fill="#FFE89A" stroke="#E7C84B"/>
  <text x="442" y="258" font-size="14" font-weight="700" fill="#5A4A00" text-anchor="middle">registerToolHandlers.afterCall(name, args, result)</text>
  <text x="442" y="277" font-size="12" fill="#7A6A1E" text-anchor="middle">← 모든 툴 결과가 지나가는 강제 지점 (이미 usage-guard가 사용 중)</text>

  <!-- arrow down -->
  <line x1="442" y1="286" x2="442" y2="318" stroke="#5B6473" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="452" y="306" font-size="12" fill="#6B7280">captureContext() · try/catch 로 본기능 무해</text>

  <!-- Tier1 LOCAL -->
  <rect x="80" y="322" width="350" height="220" rx="12" fill="#E6F4EA" stroke="#86C79A"/>
  <circle cx="100" cy="348" r="6" fill="#2E9E5B"/>
  <text x="114" y="353" font-size="15" font-weight="700" fill="#1B6B3A">Tier 1 · LOCAL (항상)</text>
  <text x="100" y="382" font-size="13" fill="#244A33">designDecisions.jsonl 계열에 append</text>
  <text x="100" y="404" font-size="12" fill="#3D6B4F">dedup 해시 + 200행 cap (기존 적재기 재사용)</text>
  <text x="100" y="430" font-size="13" fill="#244A33">egress 없음 · 동의 이슈 없음</text>
  <text x="100" y="452" font-size="13" fill="#244A33">→ 그 소비자 본인 flywheel에 즉시 도움</text>
  <text x="100" y="486" font-size="12" fill="#3D6B4F">promoteDesignDecisions → get_guide(principles)</text>
  <text x="100" y="506" font-size="12" fill="#3D6B4F">(임계치 노이즈필터 — 이미 동작 중)</text>

  <!-- Tier2 EGRESS -->
  <rect x="454" y="322" width="350" height="220" rx="12" fill="#E7EEFB" stroke="#8FB0E8"/>
  <circle cx="474" cy="348" r="6" fill="#2F6BD6"/>
  <text x="488" y="353" font-size="15" font-weight="700" fill="#1E4FA3">Tier 2 · EGRESS (opt-in)</text>
  <text x="474" y="382" font-size="13" fill="#1F3A66">ship moment(build/validate)에서만 전송</text>
  <text x="474" y="404" font-size="12" fill="#3A5688">flush큐 → post(3회 재시도/백오프) → 실패시 enqueue</text>
  <text x="474" y="430" font-size="13" fill="#1F3A66">derived 신호만 — 원본 PRD egress 금지</text>
  <text x="474" y="456" font-size="13" fill="#1F3A66">게이트: 사내 = on / 외부·미지 = off</text>
  <text x="474" y="486" font-size="12" fill="#3A5688" font-style="italic">NUDGE_CONTEXT_COLLECTION (=0 으로 끄기)</text>
  <text x="474" y="510" font-size="12" fill="#3A5688">postJsonToWebhook(kind:'context') — 기존 전송 재사용</text>

  <!-- arrow Tier2 -> backend -->
  <line x1="629" y1="542" x2="629" y2="600" stroke="#2F6BD6" stroke-width="1.6" marker-end="url(#arrowBlue)"/>

  <!-- Backend -->
  <rect x="454" y="602" width="350" height="50" rx="10" fill="#EEF1F5" stroke="#C7CEDA"/>
  <text x="629" y="632" font-size="13" font-weight="600" fill="#1A1F2B" text-anchor="middle">수집 백엔드 (구글시트 / DB) — kind:'context'</text>

  <!-- arrow backend -> SSOT -->
  <line x1="629" y1="652" x2="629" y2="690" stroke="#5B6473" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="639" y="676" font-size="12" fill="#6B7280">사람이 승격 검토</text>

  <!-- SSOT -->
  <rect x="454" y="692" width="350" height="50" rx="10" fill="#FFE89A" stroke="#E7C84B"/>
  <text x="629" y="722" font-size="13" font-weight="700" fill="#5A4A00" text-anchor="middle">guides / UX-writing SSOT (get_guide에 머지)</text>

  <!-- flywheel dashed: SSOT -> back to consumer -->
  <path d="M454,717 L34,717 L34,126 L56,126" fill="none" stroke="#9333EA" stroke-width="1.6" stroke-dasharray="6 5" marker-end="url(#arrowFly)"/>
  <text x="44" y="430" font-size="12" fill="#9333EA" font-weight="600" transform="rotate(-90 44 430)" text-anchor="middle">↺ flywheel · 다음 목업에 자동 반영</text>

  <!-- ===== RIGHT NOTES PANEL ===== -->

  <!-- (1) enforce -->
  <rect x="860" y="96" width="384" height="160" rx="12" fill="#FFFFFF" stroke="#D9DEE7"/>
  <text x="880" y="124" font-size="15" font-weight="700" fill="#1A1F2B">① 어떻게 강제하나</text>
  <text x="880" y="148" font-size="12.5" fill="#4B5563">에이전트를 강제하지 않음 — 코드가 반드시 지나는</text>
  <text x="880" y="166" font-size="12.5" fill="#4B5563">지점에서 잡는다.</text>
  <text x="880" y="192" font-size="12.5" fill="#33405A">· afterCall = 전 툴 결과 중앙 관찰</text>
  <text x="880" y="212" font-size="12.5" fill="#33405A">· build(html) = validate+report 코드가 강제 발화</text>
  <text x="880" y="232" font-size="12.5" fill="#9A6A00">· 유저 교정 등 협조 필요 신호 = best-effort</text>

  <!-- (2) data -->
  <rect x="860" y="272" width="384" height="196" rx="12" fill="#FFFFFF" stroke="#D9DEE7"/>
  <text x="880" y="300" font-size="15" font-weight="700" fill="#1A1F2B">② 어떤 데이터를 수집</text>
  <text x="880" y="326" font-size="12.5" fill="#33405A">· PRD 원문 — recommend_page_pattern 인자</text>
  <text x="880" y="348" font-size="12.5" fill="#33405A">· 디자인 결정 — save_design_spec → jsonl (이미 적재)</text>
  <text x="880" y="370" font-size="12.5" fill="#33405A">· UX 라이팅 카피 — build/validate HTML (추출 추가)</text>
  <text x="880" y="392" font-size="12.5" fill="#33405A">· 점수·DS율·버전·surface — derived (이미 전송)</text>
  <text x="880" y="418" font-size="12.5" fill="#9A6A00">· 유저 교정 — 채팅 (협조/transcript 필요)</text>
  <text x="880" y="446" font-size="12.5" fill="#1E4FA3" font-weight="600">로컬 = raw 가능 / egress = derived만</text>

  <!-- (3) when -->
  <rect x="860" y="484" width="384" height="172" rx="12" fill="#FFFFFF" stroke="#D9DEE7"/>
  <text x="880" y="512" font-size="15" font-weight="700" fill="#1A1F2B">③ 어떤 시점에 보내나</text>
  <text x="880" y="538" font-size="12.5" fill="#33405A">· 잡기 = afterCall에서 매 호출 즉시 (로컬)</text>
  <text x="880" y="560" font-size="12.5" fill="#33405A">· 보내기 = ship moment(build / validate)만</text>
  <text x="880" y="582" font-size="12.5" fill="#9A2222">· 조회 툴(find / get_guide)은 전송 안 함</text>
  <text x="880" y="604" font-size="12.5" fill="#33405A">· 오프라인 = 큐 적재 후 다음 호출에 flush(≤20)</text>
  <text x="880" y="632" font-size="12" fill="#6B7280" font-style="italic">⚠ dev_server stop은 flush 안 함 / usageId는 이벤트 단위</text>

  <!-- footer legend -->
  <text x="860" y="700" font-size="12" fill="#9333EA" font-weight="600">↺ 보라 점선 = 학습 flywheel (수집→승격→가이드→다음 목업)</text>
  <text x="860" y="722" font-size="12" fill="#2F6BD6">■ 파랑 = 사내 opt-in 시에만 외부로 나감</text>
  <text x="860" y="744" font-size="12" fill="#2E9E5B">■ 초록 = 항상 로컬에만 (egress 없음)</text>
</svg>
