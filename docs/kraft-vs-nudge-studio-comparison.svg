<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1050" viewBox="0 0 1600 1050">
  <defs>
    <style>
      .bg { fill: #f6f7f9; }
      .panel { fill: #ffffff; stroke: #d9dee7; stroke-width: 2; }
      .title { font: 700 34px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2933; }
      .subtitle { font: 400 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #667085; }
      .h2 { font: 700 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2933; }
      .label { font: 700 17px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2933; }
      .body { font: 400 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #667085; }
      .small { font: 700 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #465264; }
      .pillText { font: 700 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .kraftFill { fill: #fff3eb; stroke: #ff7a1a; }
      .nudgeFill { fill: #edf4ff; stroke: #2563eb; }
      .kraftDot { fill: #ff7a1a; }
      .nudgeDot { fill: #2563eb; }
      .ok { fill: #12b76a; }
      .mid { fill: #f79009; }
      .dark { fill: #111827; }
      .darkPanel { fill: #1f2937; stroke: #344054; }
      .white { fill: #ffffff; }
      .mutedWhite { fill: #cbd5e1; }
      .line { stroke: #c9d1df; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#c9d1df" />
    </marker>
  </defs>

  <rect class="bg" width="1600" height="1050" />

  <text x="60" y="70" class="title">Kraft vs Nudge Studio 구조 비교</text>
  <text x="60" y="104" class="subtitle">당근 Kraft의 “의사결정 자동화 루프”와 현재 Nudge Studio 데스크톱 앱 흐름 비교</text>

  <rect x="60" y="140" width="710" height="500" rx="16" class="panel" />
  <rect x="830" y="140" width="710" height="500" rx="16" class="panel" />

  <rect x="90" y="170" width="92" height="32" rx="16" class="kraftFill" />
  <text x="112" y="192" class="pillText" fill="#9a4500">Kraft</text>
  <text x="90" y="235" class="h2">DesignSpec 중심 루프</text>

  <rect x="860" y="170" width="142" height="32" rx="16" class="nudgeFill" />
  <text x="882" y="192" class="pillText" fill="#1547a8">Nudge Studio</text>
  <text x="860" y="235" class="h2">Intake + 로컬 에이전트 흐름</text>

  <g transform="translate(90 270)">
    <circle cx="18" cy="18" r="18" class="kraftDot" /><text x="13" y="24" class="small white">1</text>
    <text x="52" y="13" class="label">사용자 요청</text>
    <text x="52" y="37" class="body">자연어로 만들 화면을 요청</text>
    <path d="M18 45 V70" class="line" />

    <circle cx="18" cy="93" r="18" class="kraftDot" /><text x="13" y="99" class="small white">2</text>
    <text x="52" y="88" class="label">Clarify</text>
    <text x="52" y="112" class="body">모호한 요구사항을 질문으로 구체화</text>
    <path d="M18 120 V145" class="line" />

    <circle cx="18" cy="168" r="18" class="kraftDot" /><text x="13" y="174" class="small white">3</text>
    <text x="52" y="163" class="label">Memory + Cases</text>
    <text x="52" y="187" class="body">이전 결정과 유사 화면 레퍼런스 참고</text>
    <path d="M18 195 V220" class="line" />

    <circle cx="18" cy="243" r="18" class="kraftDot" /><text x="13" y="249" class="small white">4</text>
    <text x="52" y="238" class="label">DesignSpec JSON</text>
    <text x="52" y="262" class="body">구조, 컴포넌트, 토큰, 상태, 근거를 코드와 분리</text>
    <path d="M18 270 V295" class="line" />

    <circle cx="18" cy="318" r="18" class="kraftDot" /><text x="13" y="324" class="small white">5</text>
    <text x="52" y="313" class="label">Generate → Verify → Memory Write</text>
    <text x="52" y="337" class="body">코드 생성, scorer 검증, 결정 로그 축적</text>
  </g>

  <g transform="translate(860 270)">
    <circle cx="18" cy="18" r="18" class="nudgeDot" /><text x="13" y="24" class="small white">1</text>
    <text x="52" y="13" class="label">Intake Modal</text>
    <text x="52" y="37" class="body">브랜드, 표면, 플랫폼, PRD, Figma/스크린샷 입력</text>
    <path d="M18 45 V70" class="line" />

    <circle cx="18" cy="93" r="18" class="nudgeDot" /><text x="13" y="99" class="small white">2</text>
    <text x="52" y="88" class="label">워크스페이스 파일 생성</text>
    <text x="52" y="112" class="body">brief.md, references.md, AGENTS.md, nudge.brand</text>
    <path d="M18 120 V145" class="line" />

    <circle cx="18" cy="168" r="18" class="nudgeDot" /><text x="13" y="174" class="small white">3</text>
    <text x="52" y="163" class="label">Claude/Codex 로컬 실행</text>
    <text x="52" y="187" class="body">작업 폴더 cwd에서 에이전트 실행 및 세션 저장</text>
    <path d="M18 195 V220" class="line" />

    <circle cx="18" cy="243" r="18" class="nudgeDot" /><text x="13" y="249" class="small white">4</text>
    <text x="52" y="238" class="label">nudge-ds MCP 조회</text>
    <text x="52" y="262" class="body">get_guide, find_component, find_token, find_icon</text>
    <path d="M18 270 V295" class="line" />

    <circle cx="18" cy="318" r="18" class="nudgeDot" /><text x="13" y="324" class="small white">5</text>
    <text x="52" y="313" class="label">HTML 생성 → 검증 → 기록</text>
    <text x="52" y="337" class="body">&lt;nds-*&gt; 목업, validate/build, 세션·피드백 로그</text>
  </g>

  <rect x="60" y="680" width="1480" height="150" rx="16" class="panel" />
  <text x="90" y="720" class="h2">핵심 판단</text>

  <g transform="translate(90 750)">
    <circle cx="8" cy="8" r="8" class="ok" />
    <text x="26" y="14" class="label">강함</text>
    <text x="86" y="14" class="body">생성 전 구조화, 로컬 컨텍스트, DS MCP 주입, HTML 검증 기반은 이미 잘 갖춰져 있음.</text>
  </g>
  <g transform="translate(90 790)">
    <circle cx="8" cy="8" r="8" class="mid" />
    <text x="26" y="14" class="label">보강 필요</text>
    <text x="126" y="14" class="body">DesignSpec JSON, 디자인 결정 로그, 크로스세션 메모리, scorer 기반 품질 평가가 Kraft 대비 빈칸.</text>
  </g>
  <g transform="translate(90 820)">
    <circle cx="8" cy="8" r="8" class="mid" />
    <text x="26" y="14" class="label">쏙 빠진 축</text>
    <text x="126" y="14" class="body">Plan/Orchestra 같은 Agent Harness와 spacing/radius/typography/screen-patterns 같은 Skill Loader 레이어가 아직 없음.</text>
  </g>
  <g transform="translate(90 850)">
    <circle cx="8" cy="8" r="8" class="mid" />
    <text x="26" y="14" class="label">Eval/Memory</text>
    <text x="126" y="14" class="body">validate 기반은 있지만 11개 scorer 점수판, 낮은 점수 자동 수정 루프, decision-log → principles 승격 구조는 아직 없음.</text>
  </g>

  <rect x="60" y="860" width="1480" height="140" rx="16" class="dark" />
  <text x="90" y="900" class="h2 white">추천 목표 구조: Harness + Skill + Spec + Eval + Memory</text>

  <g transform="translate(90 925)">
    <rect width="145" height="54" rx="10" class="darkPanel" />
    <text x="10" y="24" class="small white">1. Intake</text>
    <text x="10" y="43" class="body mutedWhite">입력 수집</text>
  </g>
  <g transform="translate(250 925)">
    <rect width="145" height="54" rx="10" class="darkPanel" />
    <text x="10" y="24" class="small white">2. Harness</text>
    <text x="10" y="43" class="body mutedWhite">Plan/Orchestra</text>
  </g>
  <g transform="translate(410 925)">
    <rect width="145" height="54" rx="10" class="darkPanel" />
    <text x="10" y="24" class="small white">3. Skill Loader</text>
    <text x="10" y="43" class="body mutedWhite">필요 규칙 로드</text>
  </g>
  <g transform="translate(570 925)">
    <rect width="145" height="54" rx="10" class="darkPanel" />
    <text x="10" y="24" class="small white">4. DesignSpec</text>
    <text x="10" y="43" class="body mutedWhite">의도/근거 저장</text>
  </g>
  <g transform="translate(730 925)">
    <rect width="145" height="54" rx="10" class="darkPanel" />
    <text x="10" y="24" class="small white">5. Generate</text>
    <text x="10" y="43" class="body mutedWhite">HTML 생성</text>
  </g>
  <g transform="translate(890 925)">
    <rect width="145" height="54" rx="10" class="darkPanel" />
    <text x="10" y="24" class="small white">6. Eval</text>
    <text x="10" y="43" class="body mutedWhite">품질 점수화</text>
  </g>
  <g transform="translate(1050 925)">
    <rect width="145" height="54" rx="10" class="darkPanel" />
    <text x="10" y="24" class="small white">7. Auto Fix</text>
    <text x="10" y="43" class="body mutedWhite">수정/재평가</text>
  </g>
  <g transform="translate(1210 925)">
    <rect width="145" height="54" rx="10" class="darkPanel" />
    <text x="10" y="24" class="small white">8. Decision Log</text>
    <text x="10" y="43" class="body mutedWhite">결정 누적</text>
  </g>
  <g transform="translate(1370 925)">
    <rect width="145" height="54" rx="10" class="darkPanel" />
    <text x="10" y="24" class="small white">9. Memory</text>
    <text x="10" y="43" class="body mutedWhite">다음 주입</text>
  </g>
</svg>
